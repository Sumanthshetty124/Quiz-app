
<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>
</head>

<body>

<h2>Quiz Working Test</h2>

<div id="quiz"></div>
<p id="result"></p>

<script>
let quiz = [
  {q:"2 + 2 = ?", o:["3","4","5","6"], a:"4"},
  {q:"Capital of India?", o:["Mumbai","Delhi","Chennai","Kolkata"], a:"Delhi"}
];

let i = 0;
let score = 0;

function loadQ(){
  let q = quiz[i];
  let html = "<h3>"+q.q+"</h3>";
  q.o.forEach(opt=>{
    html += `<button onclick="check('${opt}')">${opt}</button><br>`;
  });
  document.getElementById("quiz").innerHTML = html;
}

function check(ans){
  if(ans === quiz[i].a) score++;
  i++;
  if(i < quiz.length){
    loadQ();
  } else {
    document.getElementById("quiz").innerHTML = "Finished!";
    document.getElementById("result").innerHTML = "Score: " + score;
  }
}

loadQ();
</script>

</body>
</html>
