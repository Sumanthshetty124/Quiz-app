// ⚠️ AUTO DUPLICATE TO 102 (temporary fill if needed)
while(quiz.length <= 102){
  quiz.push(...quiz.slice(0,102-quiz.length));
}

// shuffle
quiz.sort(()=>Math.random()-0.5);

let i=0, score=0, answered=false;

// timer
let time=300;
let t=setInterval(()=>{
  time--;
  document.getElementById("timer").innerText="Time: "+time;
  if(time<=0){ clearInterval(t); endQuiz(); }
},1000);

function loadQ(){
  answered=false;
  let q=quiz[i];
  let opts=[...q.o].sort(()=>Math.random()-0.5);

  let html="<h3>"+(i+1)+". "+q.q+"</h3>";
  opts.forEach(opt=>{
    html+=`<button onclick="checkAns(this,'${opt}')">${opt}</button><br>`;
  });

  document.getElementById("quiz-box").innerHTML=html;
  document.getElementById("progress").innerText=`Question ${i+1}/102`;
}

function checkAns(btn,ans){
  if(answered) return;
  answered=true;

  let correct=quiz[i].a;
  let buttons=document.querySelectorAll("#quiz-box button");

  buttons.forEach(b=>{
    if(b.innerText===correct) b.classList.add("correct");
    if(b.innerText===ans && ans!==correct) b.classList.add("wrong");
  });

  if(ans===correct) score++;
}

function nextQ(){
  if(!answered) return alert("Select answer!");
  i++;
  if(i<102){
    loadQ();
  } else {
    endQuiz();
  }
}

function endQuiz(){
  document.getElementById("quiz-box").innerHTML="<h2>Finished!</h2>";
  document.getElementById("score").innerHTML=
    `Score: ${score}/102<br>Percentage: ${Math.round(score/102*100)}%`;
}

loadQ();
